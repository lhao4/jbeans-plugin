name: Build & Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: build-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: build-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run lightweight checks
        run: ./gradlew :jbeans-plugin:buildPlugin :jbeans-plugin:verifyPluginProjectConfiguration --no-daemon

      - name: Upload plugin artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: jbeans-plugin
          path: jbeans-plugin/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7
